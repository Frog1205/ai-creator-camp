<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>案例A · 记忆翻翻乐 | AI创造营</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  min-height:100vh;
  background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);
  font-family:"Microsoft YaHei",system-ui,sans-serif;
  color:#fff;display:flex;flex-direction:column;align-items:center;
  padding:20px;
}
h1{
  font-size:clamp(28px,5vw,42px);font-weight:900;margin-bottom:8px;
  background:linear-gradient(135deg,#ff9a56,#e94560);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.subtitle{color:#aaa;margin-bottom:20px;font-size:14px;letter-spacing:2px}
.panel{
  display:flex;gap:20px;margin-bottom:20px;flex-wrap:wrap;justify-content:center;
}
.stat{
  background:rgba(255,255,255,.08);padding:12px 24px;border-radius:12px;
  border:1px solid rgba(255,255,255,.1);min-width:100px;text-align:center;
}
.stat-label{font-size:12px;color:#aaa;margin-bottom:4px;letter-spacing:1px}
.stat-value{font-size:24px;font-weight:900;color:#ffd700}
.board{
  display:grid;grid-template-columns:repeat(4,1fr);gap:10px;
  max-width:480px;width:100%;
}
.card{
  aspect-ratio:1;perspective:1000px;cursor:pointer;
}
.card-inner{
  position:relative;width:100%;height:100%;
  transition:transform .5s;transform-style:preserve-3d;
}
.card.flipped .card-inner,.card.matched .card-inner{transform:rotateY(180deg)}
.card-face{
  position:absolute;width:100%;height:100%;
  border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-size:clamp(28px,6vw,42px);font-weight:900;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
}
.card-front{
  background:linear-gradient(135deg,#667eea,#764ba2);
  box-shadow:0 4px 12px rgba(0,0,0,.3);
}
.card-front::after{content:'?';color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.4)}
.card-back{
  background:linear-gradient(135deg,#fff,#ffd700);
  transform:rotateY(180deg);color:#1a1a2e;
  box-shadow:0 4px 12px rgba(0,0,0,.3);
}
.card.matched .card-back{
  background:linear-gradient(135deg,#2ecc71,#27ae60);color:#fff;
  animation:pop .4s ease;
}
@keyframes pop{0%{transform:rotateY(180deg) scale(1)}50%{transform:rotateY(180deg) scale(1.15)}100%{transform:rotateY(180deg) scale(1)}}
.controls{margin-top:24px;display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
button{
  padding:12px 28px;border:none;border-radius:10px;cursor:pointer;
  font-size:15px;font-weight:700;color:#fff;
  background:linear-gradient(135deg,#e94560,#ff9a56);
  box-shadow:0 4px 12px rgba(233,69,96,.4);
  transition:transform .2s;
}
button:hover{transform:translateY(-2px)}
button:active{transform:translateY(0)}
.win{
  position:fixed;inset:0;background:rgba(0,0,0,.85);
  display:none;align-items:center;justify-content:center;flex-direction:column;
  z-index:100;animation:fadeIn .3s ease;
}
.win.show{display:flex}
.win h2{font-size:48px;background:linear-gradient(135deg,#ffd700,#ff9a56);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:16px}
.win p{font-size:18px;color:#fff;margin-bottom:8px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.footer{margin-top:30px;font-size:12px;color:#666;text-align:center;letter-spacing:1px}
.footer a{color:#ffd700;text-decoration:none}
</style>
</head>
<body>

<h1>🧠 记忆翻翻乐</h1>
<p class="subtitle">AI创造营 · 案例A · 休闲解谜赛道</p>

<div class="panel">
  <div class="stat"><div class="stat-label">步数</div><div class="stat-value" id="moves">0</div></div>
  <div class="stat"><div class="stat-label">已配对</div><div class="stat-value" id="matched">0/8</div></div>
  <div class="stat"><div class="stat-label">用时</div><div class="stat-value" id="time">00:00</div></div>
</div>

<div class="board" id="board"></div>

<div class="controls">
  <button onclick="newGame()">🔄 重新开始</button>
  <button onclick="alert('提示：剩余未翻开的卡片中，至少有一对相同。\\n小技巧：先把所有卡片翻一遍记位置~')">💡 提示</button>
</div>

<div class="footer">
  AI创造营案例 · 提示词参考：<br>
  "用单个HTML做一个4×4记忆翻牌游戏，emoji作图案，翻对消除，统计步数和时间"<br>
  <a href="index.html">← 返回案例列表</a>
</div>

<div class="win" id="win">
  <h2>🎉 通关！</h2>
  <p>用时 <span id="finalTime">--</span></p>
  <p>步数 <span id="finalMoves">--</span></p>
  <button style="margin-top:20px" onclick="document.getElementById('win').classList.remove('show');newGame()">再来一局</button>
</div>

<script>
const EMOJIS=['🦄','🐉','🦊','🐼','🦁','🐸','🦉','🐙'];
let cards=[],flipped=[],matched=0,moves=0,timer=null,seconds=0,locked=false;

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function newGame(){
  cards=shuffle([...EMOJIS,...EMOJIS]);
  flipped=[];matched=0;moves=0;seconds=0;locked=false;
  document.getElementById('moves').textContent=0;
  document.getElementById('matched').textContent='0/8';
  document.getElementById('time').textContent='00:00';
  const board=document.getElementById('board');
  board.innerHTML='';
  cards.forEach((emoji,i)=>{
    const card=document.createElement('div');
    card.className='card';
    card.dataset.idx=i;
    card.innerHTML=`<div class="card-inner"><div class="card-face card-front"></div><div class="card-face card-back">${emoji}</div></div>`;
    card.onclick=()=>flip(card,i);
    board.appendChild(card);
  });
  clearInterval(timer);
  timer=setInterval(()=>{
    seconds++;
    const m=String(Math.floor(seconds/60)).padStart(2,'0');
    const s=String(seconds%60).padStart(2,'0');
    document.getElementById('time').textContent=`${m}:${s}`;
  },1000);
}

function flip(card,i){
  if(locked||card.classList.contains('flipped')||card.classList.contains('matched'))return;
  card.classList.add('flipped');
  flipped.push({card,emoji:cards[i],idx:i});
  if(flipped.length===2){
    moves++;
    document.getElementById('moves').textContent=moves;
    locked=true;
    setTimeout(()=>{
      if(flipped[0].emoji===flipped[1].emoji){
        flipped[0].card.classList.add('matched');
        flipped[1].card.classList.add('matched');
        matched++;
        document.getElementById('matched').textContent=`${matched}/8`;
        if(matched===8)win();
      }else{
        flipped[0].card.classList.remove('flipped');
        flipped[1].card.classList.remove('flipped');
      }
      flipped=[];locked=false;
    },700);
  }
}

function win(){
  clearInterval(timer);
  document.getElementById('finalTime').textContent=document.getElementById('time').textContent;
  document.getElementById('finalMoves').textContent=moves;
  setTimeout(()=>document.getElementById('win').classList.add('show'),500);
}

newGame();
</script>
</body>
</html>
